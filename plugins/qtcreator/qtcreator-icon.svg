<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Qt Creator 绿色渐变背景 -->
    <linearGradient id="qtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41cd52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="512" cy="512" r="480" fill="url(#qtGradient)" />
  
  <!-- Qt Creator 图标 -->
  <g fill="#FFFFFF">
    <!-- Qt 标志 - 左侧竖线 -->
    <rect x="280" y="280" width="80" height="460" rx="40" />
    
    <!-- Qt 标志 - 右侧竖线 -->
    <rect x="664" y="280" width="80" height="460" rx="40" />
    
    <!-- Qt 标志 - 顶部横线 -->
    <rect x="280" y="280" width="464" height="80" rx="40" />
    
    <!-- Qt 标志 - 底部横线 -->
    <rect x="280" y="660" width="464" height="80" rx="40" />
    
    <!-- Qt 标志 - 内部圆角矩形 -->
    <rect x="360" y="360" width="304" height="304" rx="60" fill="#41cd52" />
    
    <!-- Qt 标志 - 中心 Q 字母 -->
    <g fill="#FFFFFF">
      <!-- Q 的外圆 -->
      <circle cx="512" cy="512" r="100" fill="none" stroke="#FFFFFF" stroke-width="32" />
      
      <!-- Q 的横线 -->
      <rect x="512" y="552" width="80" height="32" rx="8" />
      
      <!-- Q 的尾部 -->
      <path d="M 592 592 L 652 652 L 620 684 L 560 624 Z" />
    </g>
    
    <!-- Qt Creator 齿轮装饰 -->
    <g fill="#41cd52" opacity="0.3">
      <!-- 左上齿轮齿 -->
      <rect x="240" y="240" width="60" height="60" rx="10" transform="rotate(45 270 270)" />
      
      <!-- 右上齿轮齿 -->
      <rect x="724" y="240" width="60" height="60" rx="10" transform="rotate(-45 754 270)" />
      
      <!-- 左下齿轮齿 -->
      <rect x="240" y="724" width="60" height="60" rx="10" transform="rotate(-45 270 754)" />
      
      <!-- 右下齿轮齿 -->
      <rect x="724" y="724" width="60" height="60" rx="10" transform="rotate(45 754 754)" />
    </g>
  </g>
</svg>
