<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- D-Feet 橙色渐变背景 -->
    <linearGradient id="dfeetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="512" cy="512" r="480" fill="url(#dfeetGradient)" />
  
  <!-- D-Feet 图标 -->
  <g fill="#FFFFFF">
    <!-- 主体圆形 -->
    <circle cx="512" cy="512" r="200" fill="none" stroke="#FFFFFF" stroke-width="48" />
    
    <!-- 内部装饰圆环 -->
    <circle cx="512" cy="512" r="140" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-dasharray="20 20" />
    
    <!-- DBus 符号 d -->
    <text x="512" y="580" font-family="Arial, sans-serif" font-size="280" font-weight="bold" text-anchor="middle" fill="#FFFFFF">d</text>
    
    <!-- 装饰点 -->
    <circle cx="512" cy="512" r="20" fill="#FFFFFF" />
  </g>
</svg>
